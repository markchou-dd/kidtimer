<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KidTimer">
  <link rel="apple-touch-icon" href="icon.png">
  <title>KidTimer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', system-ui, sans-serif;
      background: linear-gradient(135deg, #57C870, #2E9E4F);
      transition: background 0.6s ease;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    body.state-idle    { background: linear-gradient(135deg, #57C870, #2E9E4F); }
    body.state-green   { background: linear-gradient(135deg, #57C870, #2E9E4F); }
    body.state-amber   { background: linear-gradient(135deg, #FFA726, #E65100); }
    body.state-red     { background: linear-gradient(135deg, #EF5350, #B71C1C); }
    body.state-done    { background: linear-gradient(135deg, #FFA726, #E65100); }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      width: 100%;
      max-width: 360px;
    }

    /* ── Ring ── */
    .ring-wrap {
      position: relative;
      width: min(80vw, 300px);
      height: min(80vw, 300px);
    }

    svg {
      width: 100%;
      height: 100%;
      transform: scale(-1, 1) rotate(-90deg);
      transform-origin: center;
      filter: drop-shadow(0 6px 20px rgba(0,0,0,0.2));
    }

    .track  { fill: rgba(255,255,255,0.15); }
    .prog   {
      fill: none;
      stroke: white;
      stroke-width: 22;
      stroke-linecap: round;
      /* dasharray set by JS */
      transition: stroke-dashoffset 0.1s linear;
    }

    .center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .time {
      font-size: clamp(40px, 13vw, 54px);
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .total {
      font-size: clamp(14px, 4vw, 17px);
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.5px;
    }

    .done-label {
      font-size: clamp(28px, 9vw, 38px);
      font-weight: 900;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    /* ── Buttons ── */
    .quick-row {
      display: flex;
      gap: 12px;
    }

    .q-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: clamp(62px, 18vw, 74px);
      height: clamp(62px, 18vw, 74px);
      background: white;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      gap: 1px;
    }
    .q-btn:active { transform: scale(0.92); }
    .q-btn .n { font-size: 26px; font-weight: 900; color: #2E9E4F; }
    .q-btn .u { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; }

    .action-btn {
      padding: 15px 44px;
      border-radius: 50px;
      border: none;
      background: white;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .action-btn:active { transform: scale(0.94); }
    .action-btn.stop   { color: #EF5350; }
    .action-btn.pause  { color: #888; padding: 15px 28px; }
    .action-btn.minus  { color: #888; padding: 15px 20px; font-size: 16px; }
    .action-btn.again  { color: #FFA726; }

    .hint {
      color: rgba(255,255,255,0.8);
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      line-height: 1.5;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.25);
      margin: 4px 0;
    }

    .stepper-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .step-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.25);
      color: white;
      font-size: 26px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .step-btn:active { background: rgba(255,255,255,0.4); }

    .step-val {
      min-width: 80px;
      text-align: center;
      color: white;
      font-size: 20px;
      font-weight: 800;
    }

    .go-btn {
      padding: 12px 24px;
      border-radius: 14px;
      border: none;
      background: white;
      color: #2E9E4F;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }
    .go-btn:active { transform: scale(0.94); }

    .hidden { display: none !important; }

    /* celebration confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body class="state-idle">
<div class="wrap">

  <!-- Circle timer -->
  <div class="ring-wrap">
    <svg viewBox="0 0 300 300">
      <circle class="track" cx="150" cy="150" r="130"/>
      <circle class="prog"  cx="150" cy="150" r="110" id="ring"/>
    </svg>
    <div class="center">
      <div class="time hidden" id="time"></div>
      <div class="total hidden" id="total"></div>
      <div class="done-label hidden" id="doneLabel">Done!</div>
    </div>
  </div>

  <!-- Idle state -->
  <div id="sec-idle">
    <div class="hint" style="margin-bottom:20px">Tap to start a timer</div>
    <div class="quick-row">
      <button class="q-btn" onclick="start(1*60)">  <span class="n">1</span> <span class="u">min</span></button>
      <button class="q-btn" onclick="start(2*60)">  <span class="n">2</span> <span class="u">min</span></button>
      <button class="q-btn" onclick="start(5*60)">  <span class="n">5</span> <span class="u">min</span></button>
      <button class="q-btn" onclick="start(10*60)"> <span class="n">10</span><span class="u">min</span></button>
    </div>
    <div class="divider" style="margin-top:20px"></div>
    <div class="stepper-row">
      <button class="step-btn" onclick="adjustCustom(-1)">−</button>
      <div class="step-val" id="customVal">3 min</div>
      <button class="step-btn" onclick="adjustCustom(1)">+</button>
      <button class="go-btn" onclick="startCustom()">Go</button>
    </div>
  </div>

  <!-- Running state -->
  <div id="sec-run" class="hidden" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;">
    <button class="action-btn stop"  onclick="stop()">Stop</button>
    <button class="action-btn pause" id="pauseBtn" onclick="togglePause()">Pause</button>
    <button class="action-btn minus" onclick="subtractTime(15)">−15s</button>
  </div>

  <!-- Done state -->
  <div id="sec-done" class="hidden">
    <button class="action-btn again" onclick="reset()">Again!</button>
  </div>

</div>

<script>
  const CIRC = 2 * Math.PI * 110;

  const ringEl     = document.getElementById('ring');
  const timeEl     = document.getElementById('time');
  const totalEl    = document.getElementById('total');
  const doneLbl    = document.getElementById('doneLabel');
  const secIdle    = document.getElementById('sec-idle');
  const secRun     = document.getElementById('sec-run');
  const secDone    = document.getElementById('sec-done');
  const pauseBtn   = document.getElementById('pauseBtn');
  const customValEl = document.getElementById('customVal');

  ringEl.style.strokeDasharray = CIRC;

  let total = 0, remaining = 0, ticker = null, paused = false;
  let customMins = 3;
  let wakeLock = null;

  // ── Custom stepper ────────────────────────────────
  function adjustCustom(delta) {
    customMins = Math.min(60, Math.max(1, customMins + delta));
    customValEl.textContent = `${customMins} min`;
  }
  function startCustom() { start(customMins * 60); }

  // ── Timer control ─────────────────────────────────
  async function acquireWakeLock() {
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
  }

  function start(secs) {
    clearInterval(ticker);
    total = secs; remaining = secs; paused = false;
    acquireWakeLock();
    ticker = setInterval(tick, 100);
    render();
  }

  function tick() {
    if (remaining > 0.1) {
      remaining -= 0.1;
    } else {
      remaining = 0;
      clearInterval(ticker);
      releaseWakeLock();
      celebrate();
    }
    render();
  }

  function togglePause() {
    if (paused) {
      paused = false;
      acquireWakeLock();
      ticker = setInterval(tick, 100);
    } else {
      paused = true;
      clearInterval(ticker);
      releaseWakeLock();
    }
    render();
  }

  function subtractTime(secs) {
    remaining = Math.max(0, remaining - secs);
    if (remaining === 0) { clearInterval(ticker); releaseWakeLock(); celebrate(); }
    else render();
  }

  function stop()  { clearInterval(ticker); releaseWakeLock(); total = 0; remaining = 0; paused = false; render(); }
  function reset() { clearInterval(ticker); releaseWakeLock(); total = 0; remaining = 0; paused = false; removeConfetti(); render(); }

  function progress() { return total > 0 ? remaining / total : 1; }

  function fmt(secs) {
    const s = Math.ceil(secs), m = Math.floor(s / 60), sec = s % 60;
    return m > 0 ? `${m}:${String(sec).padStart(2,'0')}` : `${sec}`;
  }

  // ── Render ────────────────────────────────────────
  function render() {
    const p = progress();
    const running = total > 0 && remaining > 0;

    let phase = 'idle';
    if (remaining === 0 && total === 0)    phase = 'idle';
    else if (remaining === 0 && total > 0) phase = 'done';
    else if (p > 0.55)                     phase = 'green';
    else if (p > 0.25)                     phase = 'amber';
    else                                   phase = 'red';

    document.body.className = `state-${phase}`;

    // Ring — pulse opacity when paused
    ringEl.style.strokeDashoffset = phase === 'idle' ? 0
                                  : phase === 'done' ? CIRC
                                  : CIRC * (1 - p);
    ringEl.style.stroke  = phase === 'idle' ? 'rgba(255,255,255,0.3)' : 'white';
    ringEl.style.opacity = paused ? '0.5' : '1';

    // Center labels
    timeEl.textContent  = fmt(remaining);
    totalEl.textContent = `of ${fmt(total)}`;

    show(timeEl,  running);
    show(totalEl, running);
    show(doneLbl, phase === 'done');

    // Sections
    show(secIdle, phase === 'idle');
    show(secRun,  running);
    show(secDone, phase === 'done');

    // Pause button label
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    pauseBtn.style.color = paused ? '#2E9E4F' : '#888';
  }

  function show(el, visible) {
    el.classList.toggle('hidden', !visible);
  }

  // ── Celebration ───────────────────────────────────
  function celebrate() {
    render();
    launchConfetti();
    playChime();
  }

  const COLORS = ['#ff595e','#ffca3a','#6a4c93','#1982c4','#8ac926','#ff924c'];
  function launchConfetti() {
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
        el.style.width  = (8 + Math.random() * 8) + 'px';
        el.style.height = (8 + Math.random() * 8) + 'px';
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i * 40);
    }
  }

  function removeConfetti() {
    document.querySelectorAll('.confetti-piece').forEach(e => e.remove());
  }

  function playChime() {
    try {
      const ctx = new AudioContext();
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = freq; o.type = 'sine';
        const t = ctx.currentTime + i * 0.18;
        g.gain.setValueAtTime(0.28, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        o.start(t); o.stop(t + 0.35);
      });
    } catch(e) {}
  }

  render();
</script>
</body>
</html>
